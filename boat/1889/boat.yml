short_description: |-
  'Chloe May' was built by Pete Nash, 1982, more or less single handed and named
  after his daughter.
full_description: |-
  In 1999 her owner, Simon, sailed her to the Canaries. Leaving just after the ARC
  'Chloe' beat many of the modern boats across to the Caribbean. She was very
  successful in the Antigua Classics winning every race in her class and a second
  in the Concours d’Elegance competition for owner maintained boat. After this she
  returned to England.
