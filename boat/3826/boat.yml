full_description: |-
  *Kria* was built in 2012 by Adrian Morgan of Viking Boats in Ullapool. The plans
  were modified under the guidance of Iain Oughtred himself to allow *Kria* to be
  built in local sustainable Larch and Scots Pine with Oak gunwhales using
  traditional methods and copper rivets. The sail plan was updated with a Bermudan
  Rig to improve performance. The resulting craft is genuinely beautiful and
  attracts favourable comments everywhere we go. *Kria* was originally
  commissioned to be fast and competitive for the Caledonian Raid event whilst
  being beautiful and using traditional construction methods.  
  *Kria*, by the way, is the Viking name for the Arctic Tern.  
  Kria has been well looked after and benefitted back in 2022 from a refinish at
  wooden boat specialist David Moss’ Skipool boatyard.
