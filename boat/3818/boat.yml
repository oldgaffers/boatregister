full_description: |-
  Iain Oughtred Ptarmigan sailing dinghy. First launched
  in 1994 and built as part of a Classic Boat
  magazine competition.

  The Ptarmigan was designed by Oughtred based
  on a 19th Century ships boat and intended as a safer
  and more capable alternative to the Acorn skiff.

  The stiffer bilges and flatter sole sections make her
  a stiffer boat than something like the Acorn, more
  stable and able to carry heavier loads. Having said
  this the Ptarmigan still rows beautifully and sails
  very well.

  The boat came with 2 rig options, either the simple
  standing lug, or as with this boat the gunter sloop.
  Converted to lug 2025 so I have both options
