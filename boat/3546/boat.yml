  sales_text: |-
    The Ebihen 16 is fantastic water-ballasted dayboat suitable for the family,
    single handed sailing, racing and camp cruising. It is a boat that was designed
    by renowned French naval architect, Francois Vivier - very much in the spirit of
    the traditional Breton working boats but built using modern techniques and
    materials. These boats are very rarely available in the UK. This particular
    example was built by an experienced amateur using the very best materials,
    fittings and finishes. It was launched in 2022, not used at all in 2023 or 2025
    and only lightly used in 2024. It has been stored under cover when not in use
    and is in pristine condition, throughout, and ready to launch.  

    Gaff main and jib in Clipper canvas by James Lawrence. Both have covers. Jib has
    Aeroluffspar reefing/furling.  

    12v battery with solar panel and charge controller    

    Electric and manual bilge pumps  

    Fire extinguisher  

    Pair of 3.1 m oars with oarlocks, sculling notch  

    Professionally Coppercoated below the waterline in 2023  

    De Graaff braked trailer with spare wheel and lightboard  

    Flat cover for trailing and storage by Trident UK  

    Pair of galley boxes for camp cruising  

    Tent for camp cruising (not fully fitted)  

    There is an option to buy an ePropulsion Spirit 1.0 electric motor.
