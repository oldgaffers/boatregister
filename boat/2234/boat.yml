short_description: |-
  'Marjory' is a 16'9" Shilling gaff yawl designed and built by Phil Swift
  of Willow Bay Boats - in cedar strip/epoxy, 1998. She was the first Shilling he
  built.
full_description: |-
  The first Shilling - designed and built by Phil Swift.  Marjory draws 12" with
  centreboard up. She has two full length berths, seated headroom, a spirit stove,
  ample storage and sealed buoyancy, yet she's only 16' 9" long (excl. bowsprit
  and bumpkin) and is very easilly towed by a 1.9 litre family car.  There was an
  article/review on her in Watercraft magazine (Jan/Feb 1999).

  She is a joy to sail and was overall winner of the Yarmouth Old Gaffers
  Race 2014.
