full_description: |-
  Ivy Green was designed, by Ed Burnett, to be sailed by two people over 50 years
  old; to be a sea kindly, safe, comfortable cruising boat; to sail well, look
  well, be easy to manoeuvre and easy to maintain. She comfortably meets all of
  those requirements.  
  Launched in 2003 at the Elephant Boatyard, Ivy Green spent ten years on the East
  Coast before returning to Solent waters in 2014. She has cruised the East Coast,
  the English Channel and Scottish waters.

  Ivy Green is a regular at OGA and classic sailing events around the Solent.

  Her modern strip plank construction combines a warm varnished interior, with
  light weight and stiffness, ensuring that she lives up to Ed Burnett’s
  reputation for “Turbo charged gaffers”.
