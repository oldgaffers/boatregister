short_description: |-
  A Boat with a Pedigree and a sheer joy to sail. Bruce Grant bought her in 1985
  and brought her up from Chichester to Northumberland. Since then the North Sea
  has been her playground : between St Kilda The Faroes Norway and Holland and
  Chichester. And gosh she has been fun.
full_description: |-
  A Storr Tumlaren which means a large dolphin. Knud Reimer designed her and
  Adlard Coles drew attention to her with his sister ship "Cohoe" of which he was
  full of praise.
