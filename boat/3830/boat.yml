full_description: |-
  Originally named *Martha Miller of Mersea* and owned and kept for many years at
  Emsworth. A new owner renamed her *Zele* circa 2019 and still kept her at
  Emsworth. Further new owner renamed her Lavinia Rose circa 2021 and brought her
  to Windermere. Current owner brought her to the Gareloch, off the Clyde estuary
  in 2025.  
  Light grey painted hull, with dark grey shear strake, cream deck.
