full_description: |-
  Originally named Martha Miller of Mersea and owned and kept for many years at
  Emsworth, New owner renamed her Zele circa 2019 kept at Emsworth. Further new
  owner renamed her Lavinia Rose circa 2021 kept on Windermere. Current owner
  brought her to the Gareloch, off the Clyde estuary in 2025.  
  Light grey painted hull, with dark grey shear strake, cream deck.
