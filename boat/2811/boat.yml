  sales_text: |-
    Open to Offers.  
    *Zenith* is a Deben 4 tonner class gaff cutter built in 1938. She was designed
    by William Maxwell Blake and built by Whisstocks Boatyard. The hull is planked
    in Pitch Pine with frames of Oak. The coachroof and cockpit are of mahogany. She
    was re-decked in 1999 and a Yanmar 1GM Diesel was then installed. We found her
    in a very neglected state in 2021 and have restored her.

    **The work includes:**

    New Toe Rails and Rubbing Strakes, Complete engine overhaul, new running and
    standing rigging, complete repaint and varnish both internally and externally.
    There was some Rot in the mast and stem which has been repaired and the hull is
    otherwise sound. The engine has been regularly serviced.

    **Interior**

    2 berths with galley and gas cooker with grill, small chart table, saloon table.

    LOA 23ft excluding bowsprit

    LWL 19ft

    Draft 3ft 6in

    Disp 3.25 tonnes

    The sails are in fair to good condition dating from about 2008. There is an
    overall heavy duty winter cover with ridge pole plus cockpit cover and there is
    also a small Zodiac Dinghy with oars which belonged to my late Uncle and has
    hardly been used. There is no electronics apart from an echo sounder. There are
    two anchors, warps and fenders

    *Zenith* has a mooring at the River Yar Boatyard all paid up until 31st December
    2026
