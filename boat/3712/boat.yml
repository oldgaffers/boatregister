  sales_text: |-
    *Pooh Bear* is a well mainained standard Longboat, and comes complete with
    outboard and trailer.    
    The outboard is a 1998 Yamaha 9.9hp, 2 stroke, 2 cylinder. Always starts 1st
    time, summer and winter.The trailer is galvanised and has recently been
    overhauled with new shoes and cables.

    Otherwise, the boat is a standard longboat but the original, stern-fitted main
    sheet runner is missing, having been replaced at some point, with a mid-boom
    main sheet assembly. Secure extra locker fitted aft of the mast for life jackets
    etc.

    Berthed at Cardiff Bay Yacht Club.
