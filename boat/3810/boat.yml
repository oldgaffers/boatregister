short_description: |-
  **CLASSIC 19 FOOT (LOA) MAHOGANY WOODEN DAY SAILING BOAT**
full_description: |-
  Lovingly restored traditional mahogany sailing boat, double diagonally planked
  hull, epoxy sealed for durability. Gunter rigged, with jib, and a wooden mast,
  boom and bow sprit. The boat is fitted with a lifting galvanised iron keel and
  rudder. Included is a 1,300 kg road trailer (new axle and brakes 2020), ensuring
  safe and easy transport.

  Believed to have been built in 1920’s at a boatyard in Poole. Beautifully
  restored in 2020, including a new cockpit cover, main sail and boom cover
  (2020). Other items included are fenders, sole boards, anchor, boat pole. She
  has been lovingly maintained since then, and sailed in Poole Harbour. Also
  available for sale, but not included in this price is a 10 foot tender, and a
  TORQEEDO electric motor. Located in Poole, Dorset, this classic beauty is ready
  for its next careful owner and adventure.

  *Specifications*

  Length: 19 foot LOA, 16 1/2 LWL/LOD

  Beam: 6 foot

  Draft: 2 feet, 6 feet with keel down

  Trailer gross weight 1,300 kg, unladen 300 kg
