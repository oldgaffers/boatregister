full_description: |-
  2015 Cornish Crabber 26 cutter rigged gaffer. We are the third owners of Molly;
  her previous two owners kept her in Mylor and Falmouth; we amended the name to
  "Molly of Mylor" to avoid the confusion of two boats of the same type with the
  same name in the same area!  

  Now based in the Solent, Molly has travelled to the East Coast, Channel Islands,
  West Country and Netherlands.
