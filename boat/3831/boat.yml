full_description: |-
  North East coast one design, designed by Alan buchanan.    
  She was Built in 1963 by John Swinburne Shipyard.  
   A development from the Coronation Dayboat built by Tucker Brown,
  Burnham-on-Crouch, They were built to be raced at the south shields yacht club.
  Dipper is no 4 of 7 built there. Others are known to have been built by King's
  at Pin Mill.  
  She has been in our family since 1976, and is mostly original and structurally
  sound.
