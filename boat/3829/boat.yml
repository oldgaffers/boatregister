short_description: |-
  An Iain Oughtred 'Guillemot' design, built by her current owner high up on a
  Derbyshire hillside, 'Cachalette' was launched 2010 on Carsington Water. In 2021
  she was moved to the River Deben.
full_description: |-
  The instruction manual for the Iain Oughtred, ‘Guillemot’, design no. 54 states:
  *“A strong, stable and very capable boat along the lines of a 19th century
  ship’s boat or large yacht tender. The Guillemot has been designed for owners
  who need a more burdensome hull with flatter floors, firmer bilges and higher
  freeboard. She will not be as light and fast, but is a lot more steady in the
  water and less ‘flighty’ than the Acorn Skiff. She is finely modelled and
  performs very well indeed for a boat of this type, whether rowed or under sail.
  She can happily take a light outboard as well.”*
