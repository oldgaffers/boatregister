short_description: |-
  Named after the Scandinavian goddess, SIF was built in Odense, Denmark, 1894. An
  engine-less gaff cutter, she was re-rigged as a schooner, embarking on an
  unsuccessful round the world cruise and ending in Plymouth, England, 1934.
  Bought by an ice manufacturer who re-named her 'Icicle IV' she had her first
  motor installed.
full_description: |-
  SIF's design was based on the famed Herreshoff cutter 'Gloriana' of New York YC
  renown. She was built without an engine, and appears on the Lloyds Register of
  Yachts until 1911 as a 9 ton cutter without motor propulsion.

  After the start of her unsuccessful round the world cruise in 1934, still
  without an engine but now gaff schooner rigged, she was sold to an ice
  manufacturer in Plymouth. In 1938 her new owner renamed her Icicle IV and had
  installed a Thornycraft 'Handy Billy' petrol engine. During the war years she
  was preserved, being laid up afloat with 3" of asphalt covering her decks.

  In 1954 she changed hands again and, after several years re-fitting in Plymouth,
  Tony Williams, his brother Trevor and family set off to France in 1959 finally
  arriving in St Tropez in the summer of 1961. Icicle IV remained in the Bay of
  Canubiers until purchased by her current owner, William MacInnes who changed her
  name back to SIF in 1988, registering her under the American flag.

  This owner undertook two programmes of restoration between 1985 and 2005,
  alongside taking part in Mediterranean races, and winning on several occasions.
  Since 2005, there has been no more major restoration, just regular maintenance
  and her owner asserts that, 'SIF is in sound shape and is well maintained, using
  products that permit the proverbial 'amateur' to care for this yacht, truly a
  'one man’s' boat! I am confident she will pass any survey desired!'

  After 37 years with her, she was finally sold in Imperia Italy in 2022 to a new
  Italian owner, who thought he had a "bargain". He has no interest in classic
  boats and bought SIF only hoping to sell her on to someone wishing to restore
  her. I visited SIF in 2025 and think this is now an impossible task. During her
  storage on the hard since 2014, SIF has been stripped out, with sails still
  rotting on the booms, etc. SIF's website still
  exists: https://sif1894.wordpress.com/
