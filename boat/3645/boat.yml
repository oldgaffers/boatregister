short_description: |-
  Built in 1912 in Overton, south of Lancaster, Lady Anne is best known for her
  role in one of the unsolved mysteries of Morecambe Bay.
full_description: |-
  The Marie-Celeste of Morecambe Bay. On 7th October 1931 Lady Anne returned to
  Fleetwood with all four of her crew missing.    

  She left Barrow at 2.30pm skippered by her owner Paul Drummond, a poultry farmer
  from Cleveleys. Crewed by his cousin Alan Drummond, a solicitor from Fleetwood,
  Mayne Hughes aged 23 and Timothy Swarbrick aged 17. They were last seem by the
  Barrow Lifeboat out on a practise the run. The boat arrived at Fleetwood at dusk
  de-masted with all four crew missing. Several theories have put forward for the
  loss of the crew. The boat was over canvased. The crew were thrown out of the
  cockpit when the following sea on a run caused the boat to broach. The mainsheet
  horse was damaged. The main sheet was entangled with a buoy. The crew were eaten
  by sea monsters.  

  Lady Anne was built as a nobby yacht by Woodhouse Brothers at Overton on the
  Lune Estuary south of Lancaster.  

  She came second in the Fleetwood - Isle of Man Race in 1928 when skippered by
  Charles Tatham. Charles Tatham was a Blackpool solicitor and councillor was a
  founder and long standing secretary of Blackpool and Fleetwood Yacht Club, Their
  clubhouse is named after him.  

  She continued to sail in Morecambe Bay until 1939.

  In 1947 she was recorded as being at Clynder in the Gareloch by which time she
  had an engine.

  She has been sailed regularly in the Clyde up until present, having been in the
  same ownership for over 30 years.

  Ferro sheathing has prolonged her active life
