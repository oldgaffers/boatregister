short_description: |-
  The Marie Celeste of Morecambe Bay.  Lady Anne was built by Woodhouse Brothers
  at Overton on the Lune Estuary south of Lancaster. In 1931 she returned to
  Fleetwood with all four of her crew missing.
full_description: |-
  The Marie Celeste of Morecambe Bay. On October 7th 1931 Lady Anne returned to
  Fleetwood from Barrow with all four of her crew missing. Nobody knows what
  happen to crew.    

  The boat set from Barrow at 2.30 pm skippered by her owner Paul Drummond, a
  poultry farmer from Cleveleys with his cousin Alan Drummond, a Fleetwood
  solicitor, Mayne Hughes aged 23 and Timothy Swarbrick aged 17. They were last
  seem by Barrow Lifeboat which was out on a practise trip. She arrived at
  Fleetwood Pier demasted at dusk. Many theories have been put forward about the
  loss. The boat being over canvassed. A damaged mainsheet horse and the boat
  becoming entangled with a buoy throwing the crew into the water.  

  Lady Anne was built as a Nobby yacht by Woodhouse Brothers in Overton on the
  River Lune, She came second in the Isle of Man Midnight Race in 1928, when owned
  by Charles Tatham, a Blackpool solicotor and long serving secretary of the
  Blackpool and Fleetwood Yacht Club. Their club house is named after him.

  She continued to sail in Morecambe Bay until 1939.

  In 1947 she was recorded as being at Clynder in the Gareloch by which time she
  had an engine.

  She has been sailed regularly in the Clyde up until present, having been in the
  same ownership for over 30 years.

  Ferro sheathing has prolonged her active life
