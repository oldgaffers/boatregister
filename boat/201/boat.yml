full_description: |-
  Guiding Star is a Looe lugger built in 1907 by James Angear for the Soady family
  and converted into a yacht in 1937 at Uphams yard in Brixham. From 1960-1989 she
  was owned by Brigadier John Glennie, who sailed her all around Europe. She was
  then substantially rebuilt in the early 1990s by Barry Jobson and Jackie
  Gillespie, who sailed her to the Caribbean and back and took part in many
  classic regattas. Her current owners are Paul and Sue Eedle.  

  We're often looking for crew, so if you're interested in sailing on Guiding
  Star, please message Paul through Guiding Star's Facebook page
  at https://www.facebook.com/guidingstar1907/
