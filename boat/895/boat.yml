short_description: |-
  'Baroque' was Bill Tilman's last Bristol Channel Pilot Cutter.
full_description: |-
  'Baroque', built in 1902, served as a pilot cutter with Cardiff and Barry Pilot
  service 1902 - 1922 when she was converted to a yacht and chartered on the west
  coast of Scotland until the Second World War.

  Unrigged and with twin engines, she served as a harbour launch in Scarborough
  after the War.

  In 1973 she was bought by the famous explorer, HW Tilman, and cruised
  extensively in the Artic and in 1974 circumnavigated Spitzbergen for which
  'Baroque' won the Bluewater medal of the OCC of America.

  James Sunderland bought 'Baroque' in 1977. An active member of the OGA, he raced
  in the 1979 OGA Solent Race winning the'Gaffers Eye'. Sunderland restored and
  kept her for 24 years, selling her to Tina Trollmo and Martin Rogetzky, who took
  her to Stockholm for restoration and use as a charter vessel.
