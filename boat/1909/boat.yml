short_description: |-
  35' steel gaff cutter launched 1996, a Nick Skeates 35' Wylo with fixed keel,
  built by John Richardson. Departed Falmouth UK, Septemer 2014, visiting Spain,
  Portugal, Madeira, Canary Isles, Cape Verde Islands to Martinique (March 2015).
  Cruised the Caribbean 2015-2016 leaving Antigua May 2016 via Horta,
  then arrived home to Penzance in July 2016.
full_description: |-
  'Island Swift' is a 35' Gaff Cutter (Wylo II), designed and built in 1996 by
  Nick Skeates and John Richardson. She's one of the few examples of a modern Gaff
  Rigged cruiser, designed to sail around the world. She is easy to manage, safe
  as well as beautiful and was purchased in 2013 by Simon and JoJo of Penzance.
  Leaving Falmouth in September 2014 the family (including two teenagers) sailed
  across the Atlantic Ocean to the Caribbean, via Portugal, Spain, Maderia,
  Canaries and Cape Verde, then cruised the Caribbean.

  In April 2016 they participated in Antigua Classics winning second place in
  class, Spirit of the Regatta, the Arne Fizzell Prize for most seaworthy boat as
  well as second place in Concours d'Elegance (in class). They sailing back to the
  UK summer 2016. leaving Antigua May 2016 via Horta, then arrived home to
  Penzance in July 2016.

  Surprised winner of the  Cape Horn Trophy 2016
  - <http://www.oga.org.uk/trophies/cape-horn>

  Read the [blog](http://islandswift.blogspot.pt/?zx=e1873839c5bce7fd) of their
  adventures so far.

  When not saiing, they run [Bash Street Theatre.](http://Www.bashstreet.co.uk)

  Skipper: JoJo Pickering    
  Crew: Simon Pullum, Finbar Pullum (17 yrs) and Lochlann Pickering (15 yrs)
