short_description: |-
  *Chlamys* is a converted ship's lifeboat.
full_description: |-
  Built in 1925 at Barrow-in-Furness as a lifeboat for the S.S. *Otranto*.

  Peter and John Parsons, converted *Chlamys* into a gaff rigged yacht in the late
  50’s on the river Hamble near  Burseldon boatyard. They had considerable success
  in the East Coast  Gaffers races in the late 60’s and the early 70’s, and also
  used her for cruising on the East Coast and the Medway.
