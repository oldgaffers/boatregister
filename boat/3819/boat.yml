short_description: |-
  Traditional clinker built sailing dinghy with the benefit of two rigs. Gunter,
  where mast is stayed and a balanced Lug where the mast is stepped forward and
  remains unstayed.
full_description: |-
  *Nutz*, formerly *Oboe*, is a classic 12ft clinker built dinghy built in 2003 with
  marine ply with epoxy resin by a carpenter Richard Herbert in Essex. Number
  eight in a series of thirty. It conforms to a traditional clinker one design as
  found on the East Coast of Britain.  

  Makers specification    
  "The dinghy is handcrafted in mahogany marine plywood, solid mahogany and oak.
  Construction is glued clinker planking with copper riveted oak ribs based upon
  traditional designs by Howard Chappelle.  
  Spars are clear fir, lines, sheets and halyards in white cotton-effect polyester
  and the dinghy is finished in clear yacht varnish to bring out the beauty of the
  wood.  
  The boat is part of a limited edition and each has a signed certificate."

  It offers the choice of sailing with either one of two different rigs. A Gunter
  rig with the mast in a stayed position and a rising gaff with mainsail and jib
  up front. This is good for a crew and a more spirited sail.  

  When stepped forward the mast requires no stays and a single halyard raises the
  alternative balanced Lug main. Ideal for solo sailing. Both rigs share the same
  boom and mast.     

  Sails are by Jeckell of Wroxham.  
      
  Hull in marine ply laid in a lapstrake or clinker format, sealed with epoxy
  resin. Hull has additional  timber frames and copper roving.  

  Seat and rear transom in solid mahogany.  Centreboard, tiller, rudder and oars
  in mixed solid wood and ply.  
      
  All fittings in Brass, including folding rowlocks.     

  Marine quality buoyancy bags.  
      
  The boat was designed by the builder to be up to Class C inshore coastal waters
  standard.  

  Previously used at sea around Mersea Island, more recently inland lake use in
  Surrey.     

  Canvass cubby on stainless frame for protection when rowing or motoring. Button
  on full canvas extension when mast is stowed.     

  Combination piggy-back and road trailer to 750kgs, unbraked with EEC Type
  Approval
