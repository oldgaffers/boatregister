short_description: |-
  Traditional clinker built sailing dinghy with the benefit of two rigs. Gunter
  where the mast is stayed and a balanced Lug rig where the mast is stepped
  forward and does not require stays. Both share the same mast and boom.
full_description: |-
  “Nutz” is a classic 12ft clinker built dinghy built in 2003 with marine ply with
  epoxy resin by a carpenter Richard Herbert in Essex. Number eight in a series of
  thirty. It conforms to a traditional clinker one design as found on the East
  Coast of Britain.  
      
  The boat was designed by the builder to be up to Class C inshore coastal waters
  standard.  

  It offers the choice of sailing with either one of two different rigs. A Gunter
  rig with the mast in a stayed position and a rising gaff with mainsail and jib
  up front. This is good for a crew and a more spirited sail.  

  When stepped forward the mast requires no stays and a single halyard raises the
  alternative balanced Lug main. Ideal for solo sailing. Both rigs share the same
  boom and mast.    

  Sails are by Jeckell of Wroxham.  
      
  Hull in marine ply laid in a lapstrake or clinker format, sealed with epoxy
  resin. Hull has additional  timber frames and copper roving.  

  Seats in solid timber.  Centreboard, tiller, rudder and oars in mixed solid wood
  and ply.  
      
  All fittings in Brass, including folding rowlocks.    

  Mmarine quality buoyancy bags.  
      
  Previously used at sea around Mersea Island, more recently lake use in Surrey.    

  Canvass cubby on stainless frame for protection when rowing or motoring. Button
  on full canvas extension when mast is stowed.    

  Combination piggy-back and road trailer to 750kgs, unbraked. EEC Type Approval
