short_description: |-
  'Bluebell' is the prototype for the range Smuggler 25, now known as Tradewind
  Atoll 25.
full_description: |-
  'Bluebell' is the original steel Bluewater 25, launched as 'Jolly Jac' and
  sometimes called Smuggler 25. The design is now known as Tradewind Atoll 25.

  Reviewed in the yachting press very favourably, she is always a 'head turner'
  and 'Bluebell' gets admiring remarks wherever she goes.

  Found without a deck and coachroof in a barn, she was rebuilt with two layers of
  12mm marine ply topped with 20mm teak in 2014. Sadly, the air cooled Ducati
  engine and electrics were damaged beyond repair in 2016 and she was sold to new
  owners from Sandwich in 2017.
