full_description: |-
  *Tunstall Tide* is one of the first Gaffling 4.1 hulls, being built from a hull
  only kit cut by Demon Yachts. She was built by school students in North East
  England under the supervision of Martin Haigh. Now launched, her intended use is
  to introduce students to the joys of Gaff Rig. The process of building the
  dinghy created an opportunity for students to gain experience in boatbuilding
  skills.
