full_description: |-
  The Rouiller Brother's "Norwegian" boats (2 were built for use on Lake Geneva)
  are a light displacement version of the classic Norwegian double-ended cutter,
  with at "fin keel" below a shallow V hull. After WWII, due to lack of copper
  rivets, planking had to stop for 1 year, and due to lack of lead, an iron scrap
  in concrete keel was used. I am now in the process of rebuilding the keel fin  +
  lead bottom, and plan to launch Hetaire summer of 2026. (The "Hetaires" were the
  consorts of Greek philosophers!)
