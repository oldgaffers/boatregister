short_description: |-
  **QUENELLE’ CLASSIC 19 FOOT (LOA) MAHOGANY DAY SAILING BOAT**
full_description: |-
  Lovingly restored traditional mahogany sailing boat, double diagonally planked
  hull, recently expoxy sealed for durability. Gunter rigged with jib, and a
  wooden mast, Gunter, boom and bow sprit. The boat is fitted with a lifting
  galvanized iron keel and rudder. Included is a 1,300 kg road trailer (new axle
  2020), for safe and easy transport. Believed to have been built in 1920’s at a
  boatyard in Poole. Beautifully restored in 2020, and includes a new cockpit
  cover, main sail and boom cover. She has been lovingly maintained since then,
  and sailed in Poole Harbour. Also available for sale but not included in this
  price is a 10 foot GRP tender, and a TORQEEDO electric outboard motor. Located
  in Poole, Dorset, this classic beauty is ready for its next carefull owner and
  adventure.  

  Specifications  
  Length: 19 foot LOA, 16.5 foot LOD  
  Beam: 6 foot  
  Draft: 2 feet (keel retracted), 6 foot (keel down)
