  sales_text: |-
    Norfolk Gypsy No. 60 built by Charlie Ward North Norfolk Boatyard in 1994. 2
    owners since new, very good condition and regularly updated. Just professionally
    polished and coppercoat refreshed. Lifting centreplate gives 0.5m minimum
    draught. Sails very effectively in a seaway. All sail control lines lead back to
    cockpit, easily sailed single-handed, can sail comfortably with 4 adults in the
    cockpit. 2 full size saloon berths, cockpit tent, full set boat cushions,
    additional 2 berths under cockpit tent. Chart table and pivoting cabin table.
    Oil lamp. New sails, running rigging, coppercoat hull, varnished mast and spars,
    full electrics, NASA instruments, Hella LED navigation lights, iCom VHF DSC
    radio, EML log, depth sounder, wind direction indicator. Yanmar 1GM10 inboard
    diesel engine, top end overhauled by marine engineer, alternator and starter
    motor professionally refurbished. New prop shaft, cutlass bearing, stuffing box
    gland seal, etc. New engine battery and separate leisure battery, split charging
    and voltage monitor. Manual bilge pump. Bramber breakback trailer recently
    professionally serviced, many new parts, new tyres. Come and have an inspection!
    Photo pack can be supplied on request.  
    Presently ashore, regularly sailed at/out of Cardiff, trial sail welcomed,
    within Cardiff Bay.
