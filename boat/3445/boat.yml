short_description: |-
  *Recipe*, Norfolk Smuggler, now being sailed in Zeeland
full_description: |-
  *Recipe* current owner bought her in 2015 and needed to repair and renew
  everything except the engine and centre plate to bring her into good condition.

  Since then he has sailed her single handed in great comfort through the
  Netherlands, Belgium and England, including visits to Pin Mill, Cowes, London
  and Dieppe. *Recipe* took part in the OGA60 circumnavigation of the UK.
