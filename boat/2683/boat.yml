  sales_text: |-
    Hull built 1984, 28’ LOD, c. 5’ draught. Gaff cutter with large `racing’ rig,
    stowable bowsprit c. 13.5’. Originally built for racing, sail number (42) is
    Falmouth racing number. Cabin added later for cruising use. GRP hull, epoxy
    coated below waterline, copper coated, wooden decks and coach roof. Four berths
    in two cabins, galley with Taylor’s paraffin cooker (2 hob and oven) and sink,
    chart table, hanging locker, heads, diesel cabin heater. Range of sails
    including topsail. Perkins Perama M30 Diesel engine with new gearbox 2012.
    Taylor’s 079D diesel cabin heater, Jabsco manual toilet. Currently lying ashore,
    Essex. ?
