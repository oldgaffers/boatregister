short_description: |-
  Delightful boat to sail. Perfect for estuary and creek exploration.  Ideal for
  fishing trips. Easily fits 4 in cockpit.
full_description: |-
  Rugged boat that has the look of an Itchen Ferry when afloat. Easily sailed
  single handed but even better with two or more. The centre plate allows you to
  really get in close and avoid the tides if necessary.    
  Has a nearly new bespoke awning. Also comes with a road trailer and light board.
