full_description: |-
  *Linling*, formerly *Clachnacudney* was built as the prototype Gaffling 4.1, a
  new class of dinghy launched by the OGA in 2018. Designed by Andrew
  Wolstenholme, it was conceived to appeal to Young (and Old) Gaffers alike.    
  With an overall length of 13'6" and beam of 5'3" (4.1 x 1.6m), the 'Gaffling' is
  a comfortable size for building at home in the garage. It's easy to tow behind a
  small car and yet large enough for family sailing. The single chine hull form
  follows on from the popular dinghies of the 50s and 60s – Hornet, Graduate,
  Scorpion, GP14, etc. – but with a more classic appearance and a sweeping sheer
  and raked transom.    
  Construction is a variation of stitch-and-tape, using CNC-cut components. With
  simplicity of build in mind, and also functionality, she has a lowered deck in
  the same style as the Mirror Dinghy, which is useful for lessening the risk of
  lines going overboard and providing more sprawling space for children. The
  versatile design allows for sailing, rowing, sculling or outboard motor.  
  Since her launch in 2018, *Linling* has sailed in Solent and East Coast waters.
  She took part in the 2025 Gaffling Championships, held on Ullswater and will be
  trailed to Derwentwater, Northumberland in 2026 for the third Championship. She
  is now based at Hipkin & Oxley, Walton Backwaters with three other East Coast
  Gafflings, *Suffling*, *Essling* and *Shrimp*.
