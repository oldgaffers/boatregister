  sales_text: |-
    *Muriel* has been in the present family ownership for 50 years in which time she
    has had 3 major refits, most recently in 2017 after the owner passed away and
    his family took the boat on and undertook a professional refit to get her back
    into good sound condition.

    She was stripped back inside and out with repairs to the hull and decks where
    necessary and finished with a complete cosmetic overhaul top to bottom then a
    new Noble Spars mast was fitted.

    She is a very beautiful and interesting yacht, a sailors boat with superb
    performance in the right conditions and very eye catching looks.  She does not
    pretend to be a spacious family cruising yacht but offers enough comforts below
    decks for weekends away and regatta racing.  A very exciting yacht in nice
    condition that will grab the headlines everywhere she goes.  
    More details available at    
