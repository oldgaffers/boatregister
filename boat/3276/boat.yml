full_description: |-
  'Maia' is a traditionally built St Ives Sailing Punt constructed of Douglas fir
  on oak.

  She has a loose footed standing lug rig and no centreboard or dagger board. The
  design was developed by Jonny Nance from lines of the punt of a St Ives lugger
  'Silas'. The lines were taken off by Jonny's father in 1975.
