name: Make Dependencies
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v4
        with:
            python-version: '3.13'
      - run: python -m pip install poetry==2.1.3
      - run: python -m poetry install --no-root
      - name: create json boat files
        run: |
          python -m poetry run python make_boat_json_from_yaml fail
          echo ok        
      - name: create picklist json
        run: |
          python -m poetry run python make_picklists.py
          echo ok
      - name: update editors_choice
        run: |
          python -m poetry run python make_editors_choice.py
          echo ok
      - name: create filter list
        run: |
          python -m poetry run python make_filterable.py
          echo ok
      - name: create places list
        run: |
          python -m poetry run python places.py
          echo ok
      - name: Display merged branch name
        run: |
          echo "The branch being merged is: ${{ github.head_ref }}"
      - name: changed files
        id: changed-files
        run: |
          echo "FILES=`git diff-tree --no-commit-id --name-only -r ${{ github.event.after }}|xargs`" >> "$GITHUB_OUTPUT"
      - name: changed boats
        id: changed-boats
        env:
          CHANGED_FILES: ${{ steps.changed-files.outputs.FILES }}
        run: |
          python -m poetry run python changed_boats.py >> "$GITHUB_OUTPUT"
      - name: update lmd
        env: 
          CHANGED_BOATS: ${{ steps.changed-boats.outputs.BOATS }}
        run:
          python -m poetry run python update_lmd "${{ steps.changed-boats.outputs.BOATS }}" >> "$GITHUB_OUTPUT"
          echo ok
      - name: trigger AWS updates
        env:
          CHANGED_FILES: ${{ steps.changed-files.outputs.FILES }}
          CHANGED_BOATS: ${{ steps.changed-boats.outputs.BOATS }}
        run: |
          echo $CHANGED_BOATS
          curl -H 'content-type: application/json' -X POST https://5li1jytxma.execute-api.eu-west-1.amazonaws.com/default/public/update -d "$CHANGED_BOATS"
          echo ok
      - name: trigger gallery updates
        env:
          CHANGED_BOATS: ${{ steps.changed-boats.outputs.BOATS }}
          SMUGMUG_CLIENT_SECRET: ${{ secrets.SMUGMUG_CLIENT_SECRET }}
          SMUGMUG_SECRET_ACCESS_KEY: ${{ secrets.SMUGMUG_SECRET_ACCESS_KEY }}
          SMUGMUG_ACCESS_KEY: ${{ secrets.SMUGMUG_ACCESS_KEY }}
          SMUGMUG_API_KEY: ${{ secrets.SMUGMUG_API_KEY }}
        run: |
          echo $CHANGED_BOATS
          python -m poetry run python check_and_update_galleries.py "$CHANGED_BOATS"          
          echo ok
      - name: Add & Commit
        uses: EndBug/add-and-commit@v9
        with:
          add: '.'
      - name: publish pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run static.yml

